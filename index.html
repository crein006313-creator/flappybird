<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Flappy Bird</h1>
      <p class="instructions">Press <kbd>Space</kbd> or click/tap to flap. Press <kbd>R</kbd> to restart.</p>
      <canvas id="gameCanvas" width="420" height="620" aria-label="Flappy Bird game"></canvas>
      <section class="hud">
        <span>Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="bestScore">0</strong></span>
        <span id="status">Ready</span>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
